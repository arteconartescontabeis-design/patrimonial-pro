<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patrimonial Artecon — Administração</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --azul:#1a5276; --azul-esc:#154360; --azul-cla:#2980b9; --azul-tint:#d5e8f0;
  --bg:#f4f6f8; --surface:#ffffff; --linha:#e4e9ee;
  --texto:#1c2833; --texto-2:#5b6b7a; --texto-3:#8a99a8;
  --ok:#1e8449; --erro:#c0392b; --aviso:#b9770e;
  --r:12px; --r-sm:8px; --sombra:0 1px 3px rgba(20,40,60,.08),0 6px 24px rgba(20,40,60,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--texto);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
h1,h2,h3{font-family:'Playfair Display',serif;font-weight:700;color:var(--azul-esc);line-height:1.2}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select{font-family:inherit;font-size:15px}
a{color:var(--azul-cla)}

/* ---------- Logo ---------- */
.logo-mark{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--azul),var(--azul-cla));display:grid;place-items:center;flex-shrink:0;position:relative;overflow:hidden}
.logo-mark span{font-family:'Playfair Display',serif;color:#fff;font-weight:800;font-size:20px;z-index:1}
.logo-mark::after{content:"";position:absolute;inset:-40%;background:conic-gradient(from 0deg,transparent,rgba(255,255,255,.25),transparent);animation:spin 5s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ---------- Login ---------- */
#login{position:fixed;inset:0;display:grid;place-items:center;background:radial-gradient(1200px 600px at 70% -10%,#21618c 0%,var(--azul-esc) 45%,#0e2b3d 100%);padding:20px;z-index:50}
.login-card{background:var(--surface);border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,.3);width:100%;max-width:400px;padding:38px 34px}
.login-brand{display:flex;align-items:center;gap:12px;margin-bottom:26px}
.login-brand .logo-mark{width:46px;height:46px}
.login-brand .logo-mark span{font-size:24px}
.login-brand b{font-family:'Playfair Display',serif;font-size:21px;color:var(--azul-esc);display:block}
.login-brand small{color:var(--texto-3);font-size:12.5px;letter-spacing:.3px}
.login-card h1{font-size:22px;margin-bottom:4px}
.login-card p.sub{color:var(--texto-2);font-size:14px;margin-bottom:24px}
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:600;color:var(--texto-2);margin-bottom:6px}
.field input{width:100%;padding:12px 14px;border:1.5px solid var(--linha);border-radius:var(--r-sm);transition:border-color .15s,box-shadow .15s;background:#fbfcfd}
.field input:focus{outline:none;border-color:var(--azul-cla);box-shadow:0 0 0 3px var(--azul-tint)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 18px;border-radius:var(--r-sm);font-weight:600;font-size:14.5px;transition:.15s;white-space:nowrap}
.btn-primary{background:var(--azul);color:#fff;width:100%}
.btn-primary:hover{background:var(--azul-esc)}
.btn-primary:disabled{opacity:.6;cursor:not-allowed}
.btn-ghost{background:var(--surface);color:var(--azul);border:1.5px solid var(--linha)}
.btn-ghost:hover{border-color:var(--azul-cla);background:#fafcfe}
.btn-sm{padding:7px 12px;font-size:13px;border-radius:7px}
.btn-danger{color:var(--erro)}
.login-erro{background:#fdecea;color:var(--erro);padding:10px 14px;border-radius:var(--r-sm);font-size:13.5px;margin-bottom:16px;display:none}

/* ---------- App shell ---------- */
#app{display:none;min-height:100vh}
.topbar{height:62px;background:var(--surface);border-bottom:1px solid var(--linha);display:flex;align-items:center;gap:14px;padding:0 20px;position:sticky;top:0;z-index:20}
.topbar .brand{display:flex;align-items:center;gap:11px}
.topbar .brand b{font-family:'Playfair Display',serif;font-size:17px;color:var(--azul-esc)}
.hamburger{display:none;font-size:22px;color:var(--azul);background:none;padding:4px 8px}
.spacer{flex:1}
.tenant-switch{display:flex;align-items:center;gap:8px}
.tenant-switch select{padding:8px 12px;border:1.5px solid var(--linha);border-radius:8px;background:#fbfcfd;color:var(--texto);max-width:240px}
.userchip{display:flex;align-items:center;gap:9px;padding:5px 6px 5px 12px;border-radius:30px;border:1px solid var(--linha)}
.userchip .av{width:30px;height:30px;border-radius:50%;background:var(--azul-tint);color:var(--azul-esc);display:grid;place-items:center;font-weight:700;font-size:13px}
.userchip small{color:var(--texto-2);font-size:13px;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.shell{display:flex}
.sidebar{width:236px;background:var(--surface);border-right:1px solid var(--linha);min-height:calc(100vh - 62px);padding:18px 12px;position:sticky;top:62px;align-self:flex-start;flex-shrink:0}
.nav-label{font-size:11px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--texto-3);padding:0 12px;margin:6px 0 8px}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:9px;color:var(--texto-2);font-weight:500;font-size:14.5px;width:100%;text-align:left;transition:.12s}
.nav-item:hover{background:#f1f5f9;color:var(--texto)}
.nav-item.active{background:var(--azul);color:#fff}
.nav-item .ic{width:18px;text-align:center;font-size:16px}
.content{flex:1;padding:28px 32px;max-width:1100px}
.page-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap}
.page-head h1{font-size:26px}
.page-head p{color:var(--texto-2);font-size:14.5px;margin-top:3px}

/* ---------- Card / table ---------- */
.card{background:var(--surface);border:1px solid var(--linha);border-radius:var(--r);box-shadow:var(--sombra);overflow:hidden}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--texto-3);padding:13px 18px;border-bottom:1px solid var(--linha);background:#fbfcfd}
td{padding:13px 18px;border-bottom:1px solid var(--linha);font-size:14.5px}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafcfe}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
.badge.ativo{background:#e8f6ef;color:var(--ok)}
.badge.inativo{background:#f1f3f5;color:var(--texto-3)}
.badge.role{background:var(--azul-tint);color:var(--azul-esc);text-transform:capitalize}
.row-actions{display:flex;gap:6px;justify-content:flex-end}
.empty{padding:48px 24px;text-align:center;color:var(--texto-3)}
.empty b{display:block;color:var(--texto-2);font-size:16px;margin-bottom:4px;font-family:'Playfair Display',serif}
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.toolbar input.busca{flex:1;min-width:200px;max-width:360px;padding:10px 13px;border:1.5px solid var(--linha);border-radius:8px;background:#fbfcfd}
.toolbar input.busca:focus{outline:none;border-color:var(--azul-cla);box-shadow:0 0 0 3px var(--azul-tint)}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
.badge.pf{background:#eaf3fb;color:var(--azul-esc)}
.badge.pj{background:#f3eafb;color:#6b3fa0}
.badge.sit{background:#fff4e5;color:var(--aviso);text-transform:capitalize}

/* ---------- Modal ---------- */
.modal-bg{position:fixed;inset:0;background:rgba(15,30,45,.45);display:none;place-items:center;z-index:40;padding:20px;backdrop-filter:blur(2px)}
.modal-bg.show{display:grid}
.modal{background:var(--surface);border-radius:16px;width:100%;max-width:520px;max-height:90vh;overflow:auto;box-shadow:0 24px 70px rgba(0,0,0,.3)}
.modal-head{padding:20px 24px;border-bottom:1px solid var(--linha);display:flex;align-items:center;justify-content:space-between}
.modal-head h2{font-size:19px}
.modal-head .x{font-size:22px;color:var(--texto-3);line-height:1}
.modal-body{padding:22px 24px}
.modal-foot{padding:16px 24px;border-top:1px solid var(--linha);display:flex;justify-content:flex-end;gap:10px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.modal .field input,.modal .field select{width:100%;padding:10px 12px;border:1.5px solid var(--linha);border-radius:var(--r-sm);background:#fbfcfd}
.modal .field input:focus,.modal .field select:focus{outline:none;border-color:var(--azul-cla);box-shadow:0 0 0 3px var(--azul-tint)}

/* ---------- Permissões matrix ---------- */
.perm-tools{display:flex;gap:12px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
.perm-tools select{padding:9px 13px;border:1.5px solid var(--linha);border-radius:8px;background:#fbfcfd;min-width:240px}
.perm-note{font-size:13px;color:var(--texto-2);background:#fbfcfd;border:1px solid var(--linha);border-left:3px solid var(--azul);padding:11px 14px;border-radius:8px;margin-bottom:16px}
.perm-table td{text-align:center}
.perm-table td.mod{text-align:left;font-weight:600;color:var(--texto)}
.perm-table input[type=checkbox]{width:18px;height:18px;accent-color:var(--azul);cursor:pointer}

/* ---------- Toast / loader ---------- */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(120%);background:var(--azul-esc);color:#fff;padding:13px 22px;border-radius:30px;font-size:14px;font-weight:500;box-shadow:0 10px 30px rgba(0,0,0,.25);z-index:60;transition:transform .3s;max-width:90vw}
#toast.show{transform:translateX(-50%) translateY(0)}
#toast.erro{background:var(--erro)}
.loader{display:inline-block;width:16px;height:16px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
.skeleton{padding:40px;text-align:center;color:var(--texto-3)}

.hidden{display:none!important}
@media(max-width:860px){
  .hamburger{display:block}
  .sidebar{position:fixed;top:62px;left:0;bottom:0;z-index:25;transform:translateX(-100%);transition:transform .25s;box-shadow:8px 0 30px rgba(0,0,0,.12)}
  .sidebar.open{transform:translateX(0)}
  .content{padding:20px 16px}
  .tenant-switch select{max-width:130px}
  .userchip small{display:none}
  .grid2{grid-template-columns:1fr}
  .topbar .brand b{display:none}
}
</style>
</head>
<body>

<!-- ====================== LOGIN ====================== -->
<div id="login">
  <div class="login-card">
    <div class="login-brand">
      <div class="logo-mark"><span>A</span></div>
      <div><b>Patrimonial</b><small>Artecon · Gestão de Holdings</small></div>
    </div>
    <h1>Acessar o sistema</h1>
    <p class="sub">Informe suas credenciais para continuar.</p>
    <div class="login-erro" id="loginErro"></div>
    <div class="field"><label>E-mail</label><input id="loginEmail" type="email" placeholder="voce@artecon.cnt.br" autocomplete="username"></div>
    <div class="field"><label>Senha</label><input id="loginSenha" type="password" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="btn btn-primary" id="btnLogin">Entrar</button>
    <p style="text-align:center;color:var(--texto-3);font-size:11px;margin-top:18px;letter-spacing:.3px">build 2026.07a</p>
  </div>
</div>

<!-- ====================== APP ====================== -->
<div id="app">
  <div class="topbar">
    <button class="hamburger" id="hamburger">&#9776;</button>
    <div class="brand"><div class="logo-mark"><span>A</span></div><b>Patrimonial</b></div>
    <div class="spacer"></div>
    <div class="tenant-switch">
      <select id="tenantSel" title="Empresa ativa"></select>
    </div>
    <div class="userchip">
      <div class="av" id="userAv">–</div>
      <small id="userNome">–</small>
      <button class="btn btn-sm btn-ghost" id="btnSair">Sair</button>
    </div>
  </div>

  <div class="shell">
    <aside class="sidebar" id="sidebar">
      <div class="nav-label">Cadastros</div>
      <button class="nav-item" data-route="pessoas" data-modulo="pessoas"><span class="ic">&#128101;</span> Pessoas</button>
      <button class="nav-item" data-route="ativos" data-modulo="patrimonio"><span class="ic">&#128188;</span> Ativos</button>
      <div class="nav-label" style="margin-top:14px">Administração</div>
      <button class="nav-item" data-route="empresas" data-modulo="admin"><span class="ic">&#127970;</span> Empresas</button>
      <button class="nav-item" data-route="usuarios" data-modulo="admin"><span class="ic">&#128100;</span> Usuários</button>
      <button class="nav-item" data-route="acessos" data-modulo="admin"><span class="ic">&#128273;</span> Acessos</button>
    </aside>

    <main class="content" id="content"><div class="skeleton">Carregando…</div></main>
  </div>
</div>

<div class="modal-bg" id="modalBg"><div class="modal" id="modal"></div></div>
<div id="toast"></div>

<script>
// ============================================================
// CONFIG — preencher com os dados do seu projeto Supabase
// ============================================================
const SUPABASE_URL = 'https://rujfstmskkgyeksspyoa.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_lAyztS-kWdXyJlnsYUT9yg_KQ4HZ_39'; // chave publishable (pública) — pode ficar exposta

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: { persistSession: false, autoRefreshToken: true }
});

// Módulos do sistema (para a matriz de permissões)
const MODULOS = [
  ['patrimonio','Patrimônio'],['pessoas','Pessoas e Partes'],['societario','Estrutura Societária'],
  ['onus','Ônus e Direitos Reais'],['ged','Gestão Documental'],['vencimentos','Vencimentos'],
  ['sucessorio','Planejamento Sucessório'],['tributario','Motor Tributário'],['bi','BI / Relatórios'],
  ['portal','Portal do Sócio'],['contratos','Contratos e Passivos'],['admin','Administração']
];

// Tipos de usuário (papel) — rótulos amigáveis
const ROLE_LABEL = { admin:'Administrador', operador:'Usuário local', externo:'Usuário externo', consulta:'Consulta' };
const ROLE_OPCOES = [['admin','Administrador'],['operador','Usuário local'],['externo','Usuário externo']];

// Modelos de permissão por tipo (preenchem a matriz). Recebe id do módulo, retorna {ver,criar,editar,excluir}
const PERM_MODELO = {
  admin:    () => ({ver:true, criar:true, editar:true, excluir:true}),
  operador: m  => ({ver:true, criar:(m!=='admin'), editar:(m!=='admin'), excluir:false}),
  externo:  m  => ({ver:['bi','portal','patrimonio'].includes(m), criar:false, editar:false, excluir:false})
};

// Listas de domínio (Fase 1)
const TIPO_ATIVO = { imovel:'Imóvel', veiculo:'Veículo', participacao:'Participação societária', aplicacao:'Aplicação financeira', outro:'Outro' };
const ESTADO_CIVIL = [['solteiro','Solteiro(a)'],['casado','Casado(a)'],['uniao_estavel','União estável'],['divorciado','Divorciado(a)'],['viuvo','Viúvo(a)'],['separado','Separado(a)']];
const REGIME_BENS = [['comunhao_parcial','Comunhão parcial'],['comunhao_universal','Comunhão universal'],['separacao_total','Separação total'],['separacao_obrigatoria','Separação obrigatória'],['participacao_final','Participação final nos aquestos'],['nao_se_aplica','Não se aplica']];
const SITUACAO_ATIVO = [['ativo','Ativo'],['alienado','Alienado'],['baixado','Baixado'],['onerado','Onerado']];

// Estado da sessão
const ctx = { user:null, perfil:null, superadmin:false, tenants:[], tenantId:null, role:null, perms:{} };

// ---------- Utilidades ----------
const $ = s => document.querySelector(s);
function toast(msg, erro){
  const t = $('#toast'); t.textContent = msg; t.className = erro ? 'erro show' : 'show';
  clearTimeout(t._t); t._t = setTimeout(()=>t.className = erro ? 'erro' : '', 3000);
}
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function iniciais(nome){ return (nome||'?').trim().split(/\s+/).slice(0,2).map(p=>p[0]).join('').toUpperCase(); }
function fmtMoeda(v){ if(v==null||v==='') return '—'; const n=Number(v); return isNaN(n)?'—':n.toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); }
function fmtData(v){ if(!v) return '—'; const s=String(v).slice(0,10).split('-'); return s.length===3?`${s[2]}/${s[1]}/${s[0]}`:'—'; }
function podeAdmin(){ return ctx.superadmin || ctx.role === 'admin'; }

// ---------- Permissões (camada de aplicação; espelha pat_pode() no banco) ----------
// rota -> módulo. Administração exige admin; demais telas usam a matriz.
const ROUTE_MOD = { empresas:'admin', usuarios:'admin', acessos:'admin', pessoas:'pessoas', ativos:'patrimonio' };

async function carregarPermissoes(tenantId){
  ctx.perms = {};
  if(!tenantId || ctx.superadmin) return;          // superadmin não depende da matriz
  const { data } = await sb.from('pat_permissoes')
    .select('modulo,pode_ver,pode_criar,pode_editar,pode_excluir')
    .eq('usuario_id', ctx.user.id).eq('tenant_id', tenantId);
  (data||[]).forEach(p=>{ ctx.perms[p.modulo] = p; });
}

// pode(modulo, acao): admin -> tudo; linha explícita na matriz -> usa a linha;
// senão herda o padrão do tipo (PERM_MODELO). Mesma ordem do pat_pode().
function pode(modulo, acao){
  if(ctx.superadmin || ctx.role === 'admin') return true;
  const p = ctx.perms[modulo];
  if(p) return !!p['pode_'+acao];                  // linha explícita configurada na tela Acessos
  const modelo = PERM_MODELO[ctx.role];            // operador / externo
  if(!modelo) return false;
  return !!modelo(modulo)[acao];
}

function podeRota(r){
  const mod = ROUTE_MOD[r] || 'admin';
  return mod === 'admin' ? podeAdmin() : pode(mod, 'ver');
}

function primeiraRotaVisivel(){
  const vis = [...document.querySelectorAll('.nav-item')].find(n=>!n.classList.contains('hidden'));
  return vis ? vis.dataset.route : null;
}

// esconde elementos marcados com data-perm="modulo:acao" conforme pode()
function aplicarPermBotoes(scope){
  (scope||document).querySelectorAll('[data-perm]').forEach(el=>{
    const [mod, acao] = (el.dataset.perm||'').split(':');
    el.classList.toggle('hidden', !pode(mod, acao));
  });
}

function openModal(html){ $('#modal').innerHTML = html; $('#modalBg').classList.add('show'); }
function closeModal(){ $('#modalBg').classList.remove('show'); $('#modal').innerHTML=''; }
$('#modalBg').addEventListener('click', e=>{ if(e.target.id==='modalBg') closeModal(); });

// ============================================================
// AUTENTICAÇÃO
// ============================================================
$('#btnLogin').addEventListener('click', entrar);
$('#loginSenha').addEventListener('keydown', e=>{ if(e.key==='Enter') entrar(); });

async function entrar(){
  const email = $('#loginEmail').value.trim();
  const senha = $('#loginSenha').value;
  const erro = $('#loginErro');
  erro.style.display='none';
  if(!email || !senha){ erro.textContent='Informe e-mail e senha.'; erro.style.display='block'; return; }
  const btn = $('#btnLogin'); btn.disabled=true; btn.innerHTML='<span class="loader"></span> Entrando…';
  try{
    const { data, error } = await sb.auth.signInWithPassword({ email, password: senha });
    if(error) throw error;
    ctx.user = data.user;
    await carregarContexto();
    if(ctx.tenants.length === 0 && !ctx.superadmin){
      throw new Error('Seu usuário não está vinculado a nenhuma empresa. Fale com um administrador.');
    }
    iniciarApp();
  }catch(e){
    erro.textContent = traduzErro(e.message); erro.style.display='block';
  }finally{
    btn.disabled=false; btn.textContent='Entrar';
  }
}

function traduzErro(m){
  if(/Invalid login/i.test(m)) return 'E-mail ou senha incorretos.';
  if(/Email not confirmed/i.test(m)) return 'E-mail ainda não confirmado.';
  return m || 'Não foi possível entrar.';
}

async function carregarContexto(){
  // perfil
  const { data: perfil } = await sb.from('pat_usuarios').select('*').eq('id', ctx.user.id).maybeSingle();
  ctx.perfil = perfil || { nome: ctx.user.email, email: ctx.user.email };
  // superadmin
  const { data: sa } = await sb.from('pat_superadmins').select('usuario_id').eq('usuario_id', ctx.user.id).maybeSingle();
  ctx.superadmin = !!sa;
  // empresas vinculadas
  const { data: vinc } = await sb.from('pat_usuarios_empresas')
    .select('tenant_id, role, ativo, pat_tenants(nome, slug, ativo)')
    .eq('usuario_id', ctx.user.id).eq('ativo', true);
  let tenants = (vinc||[]).map(v=>({ id:v.tenant_id, role:v.role, nome:v.pat_tenants?.nome||'(sem nome)', slug:v.pat_tenants?.slug }));
  // superadmin enxerga todas as empresas
  if(ctx.superadmin){
    const { data: todas } = await sb.from('pat_tenants').select('id,nome,slug,ativo').order('nome');
    const map = new Map(tenants.map(t=>[t.id,t]));
    (todas||[]).forEach(t=>{ if(!map.has(t.id)) map.set(t.id,{ id:t.id, role:'admin', nome:t.nome, slug:t.slug }); });
    tenants = [...map.values()];
  }
  ctx.tenants = tenants;
  ctx.tenantId = tenants[0]?.id || null;
  ctx.role = tenants[0]?.role || (ctx.superadmin ? 'admin' : null);
  await carregarPermissoes(ctx.tenantId);
}

function iniciarApp(){
  $('#login').style.display='none';
  $('#app').style.display='block';
  $('#userNome').textContent = ctx.perfil.nome;
  $('#userAv').textContent = iniciais(ctx.perfil.nome);
  // selector de empresas
  const sel = $('#tenantSel');
  sel.innerHTML = ctx.tenants.map(t=>`<option value="${t.id}">${esc(t.nome)}</option>`).join('');
  sel.value = ctx.tenantId;
  sel.onchange = async ()=>{
    ctx.tenantId = sel.value;
    ctx.role = ctx.tenants.find(t=>t.id===sel.value)?.role || (ctx.superadmin?'admin':null);
    await carregarPermissoes(ctx.tenantId);
    aplicarPermissoes(); rota();

  aplicarPermissoes();
  rota();
}

  document.querySelectorAll('.nav-item').forEach(n=>{

const hamburger = $('#hamburger');
hamburger.addEventListener('click', ()=> $('#sidebar').classList.toggle('open'));
document.querySelectorAll('.nav-item').forEach(n=>{
  n.addEventListener('click', ()=>{ location.hash = n.dataset.route; $('#sidebar').classList.remove('open'); });
});
window.addEventListener('hashchange', rota);

function rota(){
  const r = (location.hash.replace('#','') || primeiraRotaVisivel() || '');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active', n.dataset.route===r));
  if(!r || !podeRota(r)){ return semAcesso(); }
  if(r==='empresas') telaEmpresas();
  else if(r==='usuarios') telaUsuarios();
  else if(r==='acessos') telaAcessos();
  else if(r==='pessoas') telaPessoas();
  else if(r==='ativos') telaAtivos();
  else semAcesso();
}

// Vincular usuário já existente / editar tipo
function formUsuario(u){
  u = u || {};
  const ed = !!u.usuario_id;
  openModal(`<div class="modal-head"><h2>${ed?'Tipo de usuário':'Vincular usuário existente'}</h2><button class="x" onclick="closeModal()">&times;</button></div>
    <div class="modal-body">
      ${ed?`<div class="field"><label>Usuário</label><input value="${esc(u.nome)} · ${esc(u.email)}" disabled></div>`
          :`<div class="field"><label>E-mail do usuário *</label><input id="u_email" type="email" placeholder="pessoa@empresa.com">
            <p style="font-size:12.5px;color:var(--texto-3);margin-top:6px">Para alguém que já tem conta. Para criar do zero, use “Novo usuário”.</p></div>`}
      <div class="field"><label>Tipo nesta empresa *</label><select id="u_role">
        ${ROLE_OPCOES.map(([v,l])=>`<option value="${v}" ${u.role===v?'selected':''}>${l}</option>`).join('')}
      </select></div>
    </div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="salvarUser">Salvar</button></div>`);
  $('#salvarUser').onclick = async ()=>{
    const role=$('#u_role').value;
    const btn=$('#salvarUser'); btn.disabled=true; btn.innerHTML='<span class="loader"></span>';
    try{
      if(ed){
        const { error } = await sb.from('pat_usuarios_empresas').update({ role, ativo:true })
          .eq('usuario_id', u.usuario_id).eq('tenant_id', ctx.tenantId);
        if(error) throw error;
      }else{
        const email=$('#u_email').value.trim().toLowerCase();
        if(!email){ throw new Error('Informe o e-mail.'); }
        const { data: pu } = await sb.from('pat_usuarios').select('id').eq('email', email).maybeSingle();
        if(!pu) throw new Error('Não há usuário com esse e-mail. Use “Novo usuário” para criar.');
        const { error } = await sb.from('pat_usuarios_empresas')
          .upsert({ usuario_id: pu.id, tenant_id: ctx.tenantId, role, ativo:true }, { onConflict:'usuario_id,tenant_id' });
        if(error) throw error;
      }
      toast(ed?'Tipo atualizado':'Usuário vinculado'); closeModal(); telaUsuarios();
    }catch(e){ toast(e.message, true); }
    finally{ btn.disabled=false; btn.textContent='Salvar'; }
  };
}
async function toggleUsuario(uid, ativo){
  const { error } = await sb.from('pat_usuarios_empresas').update({ ativo: !ativo })
    .eq('usuario_id', uid).eq('tenant_id', ctx.tenantId);
  if(error){ toast(error.message, true); return; }
  toast(ativo?'Acesso removido':'Acesso reativado'); telaUsuarios();
}

async function matrizPermissoes(uid){
  const card=$('#permCard'); card.innerHTML='<div class="skeleton">Carregando…</div>';
  const { data } = await sb.from('pat_permissoes').select('*').eq('usuario_id', uid).eq('tenant_id', ctx.tenantId);
  const map={}; (data||[]).forEach(p=>map[p.modulo]=p);
  const acoes=['ver','criar','editar','excluir'];
  card.innerHTML=`
  <div style="padding:14px 18px;border-bottom:1px solid var(--linha);display:flex;gap:10px;align-items:center;flex-wrap:wrap">
    <span style="font-size:13px;font-weight:600;color:var(--texto-2)">Aplicar modelo:</span>
    <button class="btn btn-sm btn-ghost" data-modelo="admin">Administrador</button>
    <button class="btn btn-sm btn-ghost" data-modelo="operador">Usuário local</button>
    <button class="btn btn-sm btn-ghost" data-modelo="externo">Usuário externo</button>
    <span style="flex:1"></span>
    <button class="btn btn-sm btn-ghost" id="selTudo">Selecionar tudo</button>
    <button class="btn btn-sm btn-ghost" id="limparTudo">Limpar tudo</button>
  </div>
  <table class="perm-table"><thead><tr><th class="mod" style="text-align:left">Módulo</th>
    ${acoes.map(a=>`<th style="text-align:center;text-transform:capitalize;cursor:pointer" data-col="pode_${a}" title="Marcar/limpar coluna">${a}</th>`).join('')}</tr></thead><tbody>
    ${MODULOS.map(([id,nome])=>{ const p=map[id]||{};
      return `<tr><td class="mod" data-rowmod="${id}" style="cursor:pointer" title="Marcar/limpar linha">${nome}</td>
        ${acoes.map(a=>{ const key='pode_'+a;
          return `<td><input type="checkbox" data-mod="${id}" data-acao="${key}" ${p[key]?'checked':''}></td>`;}).join('')}
      </tr>`;}).join('')}
  </tbody></table>
  <div class="modal-foot" style="border-top:1px solid var(--linha)"><button class="btn btn-primary" id="savePerm">Salvar permissões</button></div>`;

  const cbs = ()=> card.querySelectorAll('input[type=checkbox]');
  // selecionar / limpar tudo
  $('#selTudo').onclick = ()=> cbs().forEach(cb=>cb.checked=true);
  $('#limparTudo').onclick = ()=> cbs().forEach(cb=>cb.checked=false);
  // toggle por coluna
  card.querySelectorAll('th[data-col]').forEach(th=>th.onclick=()=>{
    const key=th.dataset.col; const alvo=[...cbs()].filter(cb=>cb.dataset.acao===key);
    const todos=alvo.every(cb=>cb.checked); alvo.forEach(cb=>cb.checked=!todos);
  });
  // toggle por linha
  card.querySelectorAll('td[data-rowmod]').forEach(td=>td.onclick=()=>{
    const m=td.dataset.rowmod; const alvo=[...cbs()].filter(cb=>cb.dataset.mod===m);
    const todos=alvo.every(cb=>cb.checked); alvo.forEach(cb=>cb.checked=!todos);
  });
  // modelos por tipo
  card.querySelectorAll('button[data-modelo]').forEach(btn=>btn.onclick=()=>{
    const modelo=PERM_MODELO[btn.dataset.modelo];
    MODULOS.forEach(([id])=>{ const r=modelo(id);
      ['ver','criar','editar','excluir'].forEach(a=>{
        const cb=card.querySelector(`input[data-mod="${id}"][data-acao="pode_${a}"]`); if(cb) cb.checked=!!r[a];
      });
    });
    toast('Modelo aplicado — revise e salve');
  });

  $('#savePerm').onclick = async ()=>{
    const rows={};
    cbs().forEach(cb=>{
      const m=cb.dataset.mod; rows[m]=rows[m]||{ usuario_id:uid, tenant_id:ctx.tenantId, modulo:m,
        pode_ver:false,pode_criar:false,pode_editar:false,pode_excluir:false };
      rows[m][cb.dataset.acao]=cb.checked;
    });
    const payload=Object.values(rows);
    const btn=$('#savePerm'); btn.disabled=true; btn.innerHTML='<span class="loader"></span>';
    const { error } = await sb.from('pat_permissoes').upsert(payload, { onConflict:'usuario_id,tenant_id,modulo' });
    btn.disabled=false; btn.textContent='Salvar permissões';
    if(error){ toast(error.message, true); return; }
    toast('Permissões salvas');
  };
}

    ${lista.map(p=>`<tr>
      <td><b>${esc(p.nome)}</b>${p.nome_fantasia?`<br><small style="color:var(--texto-3)">${esc(p.nome_fantasia)}</small>`:''}</td>
      <td><span class="badge ${p.tipo_pessoa==='PJ'?'pj':'pf'}">${esc(p.tipo_pessoa)}</span></td>

      <td>${esc(p.municipio)||'—'}${p.uf?'/'+esc(p.uf):''}</td>
      <td><span class="badge ${p.ativo?'ativo':'inativo'}">${p.ativo?'Ativo':'Inativo'}</span></td>
      <td><div class="row-actions">
        <button class="btn btn-sm btn-ghost" data-perm="pessoas:editar" onclick="formPessoa('${p.id}')">Editar</button>
        <button class="btn btn-sm btn-ghost btn-danger" data-perm="pessoas:excluir" onclick="inativarPessoa('${p.id}',${p.ativo})">${p.ativo?'Inativar':'Reativar'}</button>
      </div></td></tr>`).join('')}
  </tbody></table>`;
  aplicarPermBotoes(card);
}

function formPessoa(id){
  const p = id ? (_pessoasCache.find(x=>x.id===id)||{}) : {};
  const ed = !!p.id;
  const tipo = p.tipo_pessoa || 'PF';
  const pfList = _pessoasCache.filter(x=>x.tipo_pessoa==='PF' && x.id!==p.id && x.ativo!==false);
  openModal(`
    <div class="modal-head"><h2>${ed?'Editar pessoa':'Nova pessoa'}</h2><button class="x" onclick="closeModal()">&times;</button></div>
    <div class="modal-body">
      <div class="field"><label>Tipo de pessoa *</label><select id="p_tipo">
        <option value="PF" ${tipo==='PF'?'selected':''}>Pessoa Física</option>
        <option value="PJ" ${tipo==='PJ'?'selected':''}>Pessoa Jurídica</option>
      </select></div>

      <div class="field"><label id="lbl_nome">${tipo==='PJ'?'Razão social *':'Nome completo *'}</label><input id="p_nome" value="${esc(p.nome)}"></div>

      <div id="pf_fantasia_wrap" class="field ${tipo==='PJ'?'':'hidden'}"><label>Nome fantasia</label><input id="p_fantasia" value="${esc(p.nome_fantasia)}"></div>

      <div class="grid2">
        <div class="field"><label id="lbl_doc">${tipo==='PJ'?'CNPJ':'CPF'}</label><input id="p_doc" value="${esc(p.cpf_cnpj)}"></div>
        <div class="field"><label id="lbl_rgie">${tipo==='PJ'?'Inscrição Estadual':'RG'}</label><input id="p_rgie" value="${esc(p.rg_ie)}"></div>
      </div>

      <div id="bloco_pf" class="${tipo==='PF'?'':'hidden'}">
        <div class="grid2">
          <div class="field"><label>Data de nascimento</label><input id="p_nasc" type="date" value="${esc((p.data_nascimento||'').slice(0,10))}"></div>
          <div class="field"><label>Profissão</label><input id="p_prof" value="${esc(p.profissao)}"></div>
        </div>
        <div class="grid2">
          <div class="field"><label>Estado civil</label><select id="p_ecivil"><option value="">—</option>
            ${ESTADO_CIVIL.map(([v,l])=>`<option value="${v}" ${p.estado_civil===v?'selected':''}>${l}</option>`).join('')}</select></div>
          <div class="field"><label>Regime de bens</label><select id="p_regime"><option value="">—</option>
            ${REGIME_BENS.map(([v,l])=>`<option value="${v}" ${p.regime_bens===v?'selected':''}>${l}</option>`).join('')}</select></div>
        </div>
        <div class="grid2">
          <div class="field"><label>Cônjuge</label><select id="p_conjuge"><option value="">—</option>
            ${pfList.map(x=>`<option value="${x.id}" ${p.conjuge_id===x.id?'selected':''}>${esc(x.nome)}</option>`).join('')}</select></div>
          <div class="field"><label>Naturalidade</label><input id="p_natural" value="${esc(p.naturalidade)}"></div>
        </div>
      </div>

      <div id="bloco_pj" class="${tipo==='PJ'?'':'hidden'}">
        <div class="field"><label>Data de constituição</label><input id="p_const" type="date" value="${esc((p.data_constituicao||'').slice(0,10))}"></div>
      </div>

      <div class="grid2">
        <div class="field"><label>Nacionalidade</label><input id="p_nacion" value="${esc(p.nacionalidade||'Brasileira')}"></div>
        <div class="field"><label>Telefone</label><input id="p_tel" value="${esc(p.telefone)}"></div>
      </div>
      <div class="field"><label>E-mail</label><input id="p_email" type="email" value="${esc(p.email)}"></div>

      <div class="grid2">
        <div class="field"><label>CEP</label><input id="p_cep" value="${esc(p.cep)}"></div>
        <div class="field"><label>Logradouro</label><input id="p_logr" value="${esc(p.logradouro)}"></div>
      </div>
      <div class="grid2">
        <div class="field"><label>Número</label><input id="p_num" value="${esc(p.numero)}"></div>
        <div class="field"><label>Complemento</label><input id="p_compl" value="${esc(p.complemento)}"></div>
      </div>
      <div class="grid2">
        <div class="field"><label>Bairro</label><input id="p_bairro" value="${esc(p.bairro)}"></div>
        <div class="field"><label>Município</label><input id="p_mun" value="${esc(p.municipio)}"></div>
      </div>
      <div class="field"><label>UF</label><input id="p_uf" maxlength="2" style="max-width:90px;text-transform:uppercase" value="${esc(p.uf)}"></div>
      <div class="field"><label>Observações</label><input id="p_obs" value="${esc(p.observacoes)}"></div>
    </div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="salvarPessoa">Salvar</button></div>`);

  const aplicaTipo=()=>{
    const t=$('#p_tipo').value;
    $('#lbl_nome').textContent = t==='PJ'?'Razão social *':'Nome completo *';
    $('#lbl_doc').textContent  = t==='PJ'?'CNPJ':'CPF';
    $('#lbl_rgie').textContent = t==='PJ'?'Inscrição Estadual':'RG';
    $('#pf_fantasia_wrap').classList.toggle('hidden', t!=='PJ');
    $('#bloco_pf').classList.toggle('hidden', t!=='PF');
    $('#bloco_pj').classList.toggle('hidden', t!=='PJ');
  };
  $('#p_tipo').onchange = aplicaTipo;

  $('#salvarPessoa').onclick = async ()=>{
    const t=$('#p_tipo').value;
    const nome=$('#p_nome').value.trim();
    if(!nome){ toast('Informe o nome / razão social.', true); return; }
    const payload={
      tenant_id: ctx.tenantId, tipo_pessoa:t, nome,
      nome_fantasia: t==='PJ' ? ($('#p_fantasia').value.trim()||null) : null,
      cpf_cnpj: $('#p_doc').value.trim()||null,
      rg_ie: $('#p_rgie').value.trim()||null,
      data_nascimento: t==='PF' ? ($('#p_nasc').value||null) : null,
      data_constituicao: t==='PJ' ? ($('#p_const').value||null) : null,
      estado_civil: t==='PF' ? ($('#p_ecivil').value||null) : null,
      regime_bens: t==='PF' ? ($('#p_regime').value||null) : null,
      conjuge_id: t==='PF' ? ($('#p_conjuge').value||null) : null,
      profissao: t==='PF' ? ($('#p_prof').value.trim()||null) : null,
      naturalidade: t==='PF' ? ($('#p_natural').value.trim()||null) : null,
      nacionalidade: $('#p_nacion').value.trim()||null,
      email: $('#p_email').value.trim()||null,
      telefone: $('#p_tel').value.trim()||null,
      cep: $('#p_cep').value.trim()||null,
      logradouro: $('#p_logr').value.trim()||null,
      numero: $('#p_num').value.trim()||null,
      complemento: $('#p_compl').value.trim()||null,
      bairro: $('#p_bairro').value.trim()||null,
      municipio: $('#p_mun').value.trim()||null,
      uf: $('#p_uf').value.trim().toUpperCase()||null,
      observacoes: $('#p_obs').value.trim()||null
    };
    const btn=$('#salvarPessoa'); btn.disabled=true; btn.innerHTML='<span class="loader"></span>';
    const { error } = ed
      ? await sb.from('pat_pessoas').update(payload).eq('id', p.id).eq('tenant_id', ctx.tenantId)
      : await sb.from('pat_pessoas').insert(payload);
    btn.disabled=false; btn.textContent='Salvar';
    if(error){ toast(error.message, true); return; }
    toast(ed?'Pessoa atualizada':'Pessoa cadastrada'); closeModal(); telaPessoas();
  };
}

async function inativarPessoa(id, ativo){
  const { error } = await sb.from('pat_pessoas').update({ ativo: !ativo }).eq('id', id).eq('tenant_id', ctx.tenantId);
  if(error){ toast(error.message, true); return; }
  toast(ativo?'Pessoa inativada':'Pessoa reativada'); telaPessoas();
}

// ============================================================
// 2.2 ATIVOS  (módulo 'patrimonio')
// ============================================================
let _ativosCache = [];
let _pessoasParaSelect = [];

async function telaAtivos(){
  const c=$('#content');
  c.innerHTML=`<div class="page-head"><div><h1>Ativos</h1><p>Bens e direitos da holding: imóveis, veículos, participações e aplicações.</p></div>
    <button class="btn btn-primary" data-perm="patrimonio:criar" id="novoAtivo">+ Novo ativo</button></div>
    <div class="toolbar"><input class="busca" id="buscaAtivo" placeholder="Buscar por descrição ou documento…"></div>
    <div class="card" id="ativCard"><div class="skeleton">Carregando…</div></div>`;
  aplicarPermBotoes(c);
  $('#novoAtivo')?.addEventListener('click', ()=>formAtivo());

  const { data: pes } = await sb.from('pat_pessoas').select('id,nome,tipo_pessoa,ativo').eq('tenant_id', ctx.tenantId).order('nome');
  _pessoasParaSelect = (pes||[]).filter(x=>x.ativo!==false);

  const { data, error } = await sb.from('pat_ativos').select('*, pat_pessoas(nome)').eq('tenant_id', ctx.tenantId).order('descricao');
  if(error){ $('#ativCard').innerHTML=`<div class="empty">Erro: ${esc(error.message)}</div>`; return; }
  _ativosCache = data||[];
  renderAtivos(_ativosCache);
  $('#buscaAtivo').oninput = e=>{
    const q=e.target.value.toLowerCase().trim();
    renderAtivos(_ativosCache.filter(a=>(a.descricao||'').toLowerCase().includes(q)||(a.documento||'').toLowerCase().includes(q)));
  };
}

function renderAtivos(lista){
  const card=$('#ativCard');
  if(!lista.length){ card.innerHTML=`<div class="empty"><b>Nenhum ativo</b>Cadastre o primeiro bem desta empresa.</div>`; return; }
  card.innerHTML=`<table><thead><tr><th>Descrição</th><th>Tipo</th><th>Documento</th><th>Proprietário</th><th class="num">Valor atual</th><th>Situação</th><th>Status</th><th></th></tr></thead><tbody>
    ${lista.map(a=>`<tr>
      <td><b>${esc(a.descricao)}</b></td>
      <td><span class="badge role">${esc(TIPO_ATIVO[a.tipo_ativo]||a.tipo_ativo)}</span></td>
      <td>${esc(a.documento)||'—'}</td>
      <td>${esc(a.pat_pessoas?.nome)||'—'}</td>
      <td class="num">${fmtMoeda(a.valor_atual)}</td>
      <td><span class="badge sit">${esc(a.situacao)||'—'}</span></td>
      <td><span class="badge ${a.ativo?'ativo':'inativo'}">${a.ativo?'Ativo':'Inativo'}</span></td>
      <td><div class="row-actions">
        <button class="btn btn-sm btn-ghost" data-perm="patrimonio:editar" onclick="formAtivo('${a.id}')">Editar</button>
        <button class="btn btn-sm btn-ghost btn-danger" data-perm="patrimonio:excluir" onclick="inativarAtivo('${a.id}',${a.ativo})">${a.ativo?'Inativar':'Reativar'}</button>
      </div></td></tr>`).join('')}
  </tbody></table>`;
  aplicarPermBotoes(card);
}

function detalhesCampos(tipo, d){
  d=d||{};
  if(tipo==='imovel') return `
    <div class="grid2">
      <div class="field"><label>Cartório / Registro</label><input id="d_cartorio" value="${esc(d.cartorio)}"></div>
      <div class="field"><label>Inscrição municipal</label><input id="d_inscmun" value="${esc(d.inscricao_municipal)}"></div>
    </div>
    <div class="grid2">
      <div class="field"><label>Área (m²)</label><input id="d_area" value="${esc(d.area_m2)}"></div>
      <div class="field"><label>Endereço do imóvel</label><input id="d_endereco" value="${esc(d.endereco)}"></div>
    </div>`;
  if(tipo==='veiculo') return `
    <div class="grid2">
      <div class="field"><label>RENAVAM</label><input id="d_renavam" value="${esc(d.renavam)}"></div>
      <div class="field"><label>Marca / Modelo</label><input id="d_marca" value="${esc(d.marca_modelo)}"></div>
    </div>
    <div class="field"><label>Ano</label><input id="d_ano" style="max-width:120px" value="${esc(d.ano)}"></div>`;
  if(tipo==='participacao') return `
    <div class="grid2">
      <div class="field"><label>Empresa / Sociedade</label><input id="d_empresa" value="${esc(d.empresa)}"></div>
      <div class="field"><label>% de participação</label><input id="d_perc" value="${esc(d.percentual)}"></div>
    </div>
    <div class="grid2">
      <div class="field"><label>Qtde. quotas/ações</label><input id="d_qtde" value="${esc(d.quantidade)}"></div>
      <div class="field"><label>Capital integralizado</label><input id="d_capital" value="${esc(d.capital)}"></div>
    </div>`;
  if(tipo==='aplicacao') return `
    <div class="grid2">
      <div class="field"><label>Instituição</label><input id="d_inst" value="${esc(d.instituicao)}"></div>
      <div class="field"><label>Tipo de aplicação</label><input id="d_tipoapl" value="${esc(d.tipo_aplicacao)}"></div>
    </div>
    <div class="field"><label>Conta / Identificação</label><input id="d_conta" value="${esc(d.conta)}"></div>`;
  return '<p style="font-size:13px;color:var(--texto-3)">Sem campos específicos para este tipo.</p>';
}
function coletaDetalhes(tipo){
  const g=id=>{ const el=$('#'+id); return el?(el.value.trim()||null):null; };
  if(tipo==='imovel') return { cartorio:g('d_cartorio'), inscricao_municipal:g('d_inscmun'), area_m2:g('d_area'), endereco:g('d_endereco') };
  if(tipo==='veiculo') return { renavam:g('d_renavam'), marca_modelo:g('d_marca'), ano:g('d_ano') };
  if(tipo==='participacao') return { empresa:g('d_empresa'), percentual:g('d_perc'), quantidade:g('d_qtde'), capital:g('d_capital') };
  if(tipo==='aplicacao') return { instituicao:g('d_inst'), tipo_aplicacao:g('d_tipoapl'), conta:g('d_conta') };
  return {};
}

function formAtivo(id){
  const a = id ? (_ativosCache.find(x=>x.id===id)||{}) : {};
  const ed = !!a.id;
  const tipo = a.tipo_ativo || 'imovel';
  openModal(`
    <div class="modal-head"><h2>${ed?'Editar ativo':'Novo ativo'}</h2><button class="x" onclick="closeModal()">&times;</button></div>
    <div class="modal-body">
      <div class="grid2">
        <div class="field"><label>Tipo de ativo *</label><select id="a_tipo">
          ${Object.entries(TIPO_ATIVO).map(([v,l])=>`<option value="${v}" ${tipo===v?'selected':''}>${l}</option>`).join('')}</select></div>
        <div class="field"><label>Situação</label><select id="a_sit">
          ${SITUACAO_ATIVO.map(([v,l])=>`<option value="${v}" ${(a.situacao||'ativo')===v?'selected':''}>${l}</option>`).join('')}</select></div>
      </div>
      <div class="field"><label>Descrição *</label><input id="a_desc" value="${esc(a.descricao)}"></div>
      <div class="grid2">
        <div class="field"><label>Proprietário</label><select id="a_prop"><option value="">—</option>
          ${_pessoasParaSelect.map(x=>`<option value="${x.id}" ${a.proprietario_id===x.id?'selected':''}>${esc(x.nome)} (${esc(x.tipo_pessoa)})</option>`).join('')}</select></div>
        <div class="field"><label>Documento / Registro</label><input id="a_doc" value="${esc(a.documento)}"></div>
      </div>
      <div class="grid2">
        <div class="field"><label>Valor de aquisição</label><input id="a_vaq" type="number" step="0.01" value="${a.valor_aquisicao??''}"></div>
        <div class="field"><label>Data de aquisição</label><input id="a_daq" type="date" value="${esc((a.data_aquisicao||'').slice(0,10))}"></div>
      </div>
      <div class="grid2">
        <div class="field"><label>Valor atual</label><input id="a_vat" type="number" step="0.01" value="${a.valor_atual??''}"></div>
        <div class="field"><label>Data da avaliação</label><input id="a_dav" type="date" value="${esc((a.data_avaliacao||'').slice(0,10))}"></div>
      </div>
      <div style="border-top:1px solid var(--linha);margin:6px 0 14px"></div>
      <div id="a_detalhes">${detalhesCampos(tipo, a.detalhes)}</div>
      <div class="field"><label>Observações</label><input id="a_obs" value="${esc(a.observacoes)}"></div>
    </div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="salvarAtivo">Salvar</button></div>`);

  $('#a_tipo').onchange = ()=>{ $('#a_detalhes').innerHTML = detalhesCampos($('#a_tipo').value, {}); };

  $('#salvarAtivo').onclick = async ()=>{
    const t=$('#a_tipo').value;
    const desc=$('#a_desc').value.trim();
    if(!desc){ toast('Informe a descrição.', true); return; }
    const num=v=>{ v=(v??'').toString().trim(); return v===''?null:Number(v); };
    const payload={
      tenant_id: ctx.tenantId, tipo_ativo:t, descricao:desc,
      proprietario_id: $('#a_prop').value||null,
      documento: $('#a_doc').value.trim()||null,
      valor_aquisicao: num($('#a_vaq').value),
      data_aquisicao: $('#a_daq').value||null,
      valor_atual: num($('#a_vat').value),
      data_avaliacao: $('#a_dav').value||null,
      situacao: $('#a_sit').value||'ativo',
      detalhes: coletaDetalhes(t),
      observacoes: $('#a_obs').value.trim()||null
    };
    const btn=$('#salvarAtivo'); btn.disabled=true; btn.innerHTML='<span class="loader"></span>';
    const { error } = ed
      ? await sb.from('pat_ativos').update(payload).eq('id', a.id).eq('tenant_id', ctx.tenantId)
      : await sb.from('pat_ativos').insert(payload);
    btn.disabled=false; btn.textContent='Salvar';
    if(error){ toast(error.message, true); return; }
    toast(ed?'Ativo atualizado':'Ativo cadastrado'); closeModal(); telaAtivos();
  };
}

async function inativarAtivo(id, ativo){
  const { error } = await sb.from('pat_ativos').update({ ativo: !ativo }).eq('id', id).eq('tenant_id', ctx.tenantId);
  if(error){ toast(error.message, true); return; }
  toast(ativo?'Ativo inativado':'Ativo reativado'); telaAtivos();
}

window.formEmpresa=formEmpresa; window.toggleEmpresa=toggleEmpresa;
window.formUsuario=formUsuario; window.formNovoUsuario=formNovoUsuario; window.toggleUsuario=toggleUsuario;
window.formPessoa=formPessoa; window.inativarPessoa=inativarPessoa;
window.formAtivo=formAtivo; window.inativarAtivo=inativarAtivo;
window.closeModal=closeModal;

console.log('Patrimonial Artecon — app-shell · build 2026.07a (Fase 1: Pessoas e Ativos)');
